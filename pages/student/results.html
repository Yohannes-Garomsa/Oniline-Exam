<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results · Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/student.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="student-sidebar">
            <!-- same as before -->
            <div class="sidebar-header">
                <div class="sidebar-logo"><img src="../../assets/image/OIP.webp" alt="Logo"><span>OES</span><span class="role-badge">Student</span></div>
            </div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a href="available-exams.html" class="nav-link"><i class="fas fa-file-alt"></i> Available Exams</a></li>
                <li class="nav-item"><a href="results.html" class="nav-link active"><i class="fas fa-chart-bar"></i> My Results</a></li>
                <li class="nav-item"><a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userInitials">SS</div>
                    <div class="user-info">
                        <h4 id="userName">Student Name</h4>
                        <p id="userId">ID: ETUSE/XXX/2013</p>
                        <p id="userDept">Department</p>
                    </div>
                </div>
                <a href="#" class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search results..."></div>
                <div class="top-bar-actions">
                    <div class="lang-switch"><button class="lang-btn active">EN</button><button class="lang-btn">አማ</button></div>
                    <div class="notifications"><i class="fas fa-bell"></i><span class="badge">3</span></div>
                </div>
            </div>

            <h1>My Results</h1>

            <!-- Filter Bar -->
            <div class="filter-bar" style="margin-bottom: 25px;">
                <div class="filter-group">
                    <i class="fas fa-filter"></i>
                    <select id="yearFilter">
                        <option value="all">All Years</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <div class="filter-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchFilter" placeholder="Search by exam...">
                </div>
            </div>

            <!-- Results Table -->
            <div class="table-container">
                <table class="data-table" id="resultsTable">
                    <thead>
                        <tr><th>Exam Title</th><th>Course</th><th>Date</th><th>Score</th><th>Percentage</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Dynamic rows -->
                    </tbody>
                </table>
                <div id="emptyMessage" style="text-align:center; padding:30px;">No results found.</div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>

            <!-- Footer -->
            <div class="footer"><p>Ethio-Italy Polytechnic College · <span id="footerDate"></span></p></div>
        </main>
    </div>

    <script src="../../assets/js/auth-check.js"></script>
    <script src="../../assets/js/student-results.js"></script>
</body>
</html>
