<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Detail · Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/student.css">
    <style>
        .result-header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #edf2f7;
        }
        .score-badge {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .score-badge.passed { color: #28a745; }
        .score-badge.failed { color: #dc3545; }
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-item {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #edf2f7;
        }
        .question-review {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            border: 1px solid #edf2f7;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 15px;
        }
        .answer-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
        }
        .correct { color: #28a745; font-weight: 600; }
        .incorrect { color: #dc3545; font-weight: 600; }
        .option-letter {
            font-weight: 700;
            width: 30px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="student-sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><img src="../../assets/image/OIP.webp" alt="Logo"><span>OES</span><span class="role-badge">Student</span></div></div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a href="available-exams.html" class="nav-link"><i class="fas fa-file-alt"></i> Available Exams</a></li>
                <li class="nav-item"><a href="results.html" class="nav-link active"><i class="fas fa-chart-bar"></i> My Results</a></li>
                <li class="nav-item"><a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userInitials">SS</div>
                    <div class="user-info">
                        <h4 id="userName">Student Name</h4>
                        <p id="userId">ID: ETUSE/XXX/2013</p>
                        <p id="userDept">Department</p>
                    </div>
                </div>
                <a href="#" class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Search..."></div>
                <div class="top-bar-actions">
                    <div class="lang-switch"><button class="lang-btn active">EN</button><button class="lang-btn">አማ</button></div>
                    <div class="notifications"><i class="fas fa-bell"></i><span class="badge">3</span></div>
                </div>
            </div>

            <a href="results.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Results</a>

            <div id="resultContainer">
                <!-- Content loaded dynamically -->
            </div>

            <div class="footer"><p>Ethio-Italy Polytechnic College · <span id="footerDate"></span></p></div>
        </main>
    </div>

    <script src="../../assets/js/auth-check.js"></script>
    <script src="../../assets/js/student-result-detail.js"></script>
</body>
</html>
