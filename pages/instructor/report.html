<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports · Instructor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/instructor.css">
    <style>
        .report-container { background: white; border-radius: 20px; padding: 25px; margin-top: 25px; }
        .select-exam { margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .select-exam select { padding: 10px; border: 2px solid #e2e8f0; border-radius: 12px; min-width: 300px; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .results-table th { background: #f8fafc; padding: 12px; text-align: left; }
        .results-table td { padding: 12px; border-bottom: 1px solid #edf2f7; }
        .performance-card { background: #f8fafc; border-radius: 12px; padding: 15px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar (same as before) -->
        <aside class="instructor-sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><img src="../../assets/image/OIP.webp" alt="Logo"><span>OES</span><span class="role-badge">Instructor</span></div></div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a href="manage-exams.html" class="nav-link"><i class="fas fa-file-alt"></i> Manage Exams</a></li>
                                <li class="nav-item">
                    <a href="manage-exam-questions.html" class="nav-link">
                        <i class="fas fa-tasks"></i>
                        <span>Exam Questions</span>
                    </a>
                </li>
                <li class="nav-item"><a href="manage-questions.html" class="nav-link"><i class="fas fa-question-circle"></i> Question Bank</a></li>
                <li class="nav-item">
                    <a href="grade-exams.html" class="nav-link">
                        <i class="fas fa-check-double"></i>
                        <span>Grade Exams</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="results.html" class="nav-link ">
                        <i class="fas fa-chart-bar"></i>
                        <span>Results</span>
                    </a>
                </li>
                <li class="nav-item"><a href="reports.html" class="nav-link active"><i class="fas fa-chart-bar"></i> Reports</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-profile"><div class="user-avatar" id="userInitials">IN</div><div class="user-info"><h4 id="userName">Instructor</h4><p id="userEmail">email</p></div></div>
                <a href="#" class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar"><div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Search..."></div><div class="top-bar-actions"><div class="lang-switch"><button class="lang-btn active">EN</button><button class="lang-btn">አማ</button></div><div class="notifications"><i class="fas fa-bell"></i><span class="badge">3</span></div></div></div>

            <h1>Exam Reports</h1>

            <div class="report-container">
                <div class="select-exam">
                    <label for="examSelect">Select Exam:</label>
                    <select id="examSelect">
                        <option value="">-- Choose an exam --</option>
                    </select>
                    <button class="btn-save" id="loadReportBtn">Load Report</button>
                </div>

                <div id="reportContent" style="display:none;">
                    <h3>Student Results</h3>
                    <table class="results-table" id="resultsTable">
                        <thead><tr><th>Student</th><th>ID</th><th>Score</th><th>Percentage</th><th>Passed</th></tr></thead>
                        <tbody id="resultsBody"></tbody>
                    </table>

                    <h3 style="margin-top:30px;">Question Performance</h3>
                    <div id="questionPerformance"></div>
                </div>
            </div>

            <div class="footer"><p>Ethio-Italy Polytechnic College · <span id="footerDate"></span></p></div>
        </main>
    </div>
    <script src="../../assets/js/auth-check.js"></script>
    <script src="../../assets/js/instructor-reports.js"></script>
</body>
</html>
