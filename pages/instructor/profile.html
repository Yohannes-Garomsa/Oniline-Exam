<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · Student · Online Examination System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/student.css">
    <style>
        /* Additional styles specific to profile page – kept minimal */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: #1e3c72;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 600;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 2rem;
            font-weight: 700;
            color: #1e3c72;
        }
        /* Ensure form styling matches other pages */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #334155;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
        }
        .form-control:focus {
            outline: none;
            border-color: #1e3c72;
        }
        .btn-save {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save:hover {
            background: #2a5298;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="student-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../../assets/image/OIP.webp" alt="Ethio-Italy Logo">
                    <span>OES</span>
                    <span class="role-badge">Student</span>
                </div>
            </div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a href="available-exams.html" class="nav-link"><i class="fas fa-file-alt"></i> Available Exams</a></li>
                <li class="nav-item"><a href="results.html" class="nav-link"><i class="fas fa-chart-bar"></i> My Results</a></li>
                <li class="nav-item"><a href="profile.html" class="nav-link active"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userInitials">SS</div>
                    <div class="user-info">
                        <h4 id="userName">Student Name</h4>
                        <p id="userId">ID: ETUSE/XXX/2013</p>
                        <p id="userDept">Department</p>
                    </div>
                </div>
                <a href="#" class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="top-bar-actions">
                    <div class="lang-switch">
                        <button class="lang-btn active">EN</button>
                        <button class="lang-btn">አማ</button>
                    </div>
                    <div class="notifications">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                </div>
            </div>

            <h1>My Profile</h1>

            <div class="profile-container" style="background: white; border-radius: 20px; padding: 30px; margin-top: 20px;">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileInitials">SS</div>
                    <div>
                        <h2 id="profileName">Student Name</h2>
                        <p id="profileEmail">email@student.com</p>
                    </div>
                </div>

                <div class="profile-stats">
                    <div class="stat-box"><div class="number" id="statGPA">0.0</div><div>GPA</div></div>
                    <div class="stat-box"><div class="number" id="statExams">0</div><div>Exams Taken</div></div>
                    <div class="stat-box"><div class="number" id="statAvg">0%</div><div>Avg. Score</div></div>
                </div>

                <h3>Personal Information</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="form-control" id="firstName">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="form-control" id="lastName">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" id="email" readonly>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" class="form-control" id="phone">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" class="form-control" id="department" readonly>
                    </div>
                    <div class="form-group">
                        <label>Year of Study</label>
                        <input type="text" class="form-control" id="year" readonly>
                    </div>
                    <div class="form-group">
                        <label>Section</label>
                        <input type="text" class="form-control" id="section" readonly>
                    </div>
                    <button type="submit" class="btn-save">Update Profile</button>
                </form>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>Ethio-Italy Polytechnic College · <span id="footerDate"></span></p>
            </div>
        </main>
    </div>

    <script src="../../assets/js/auth-check.js"></script>
    <script src="../../assets/js/student-profile.js"></script>
</body>
</html>
